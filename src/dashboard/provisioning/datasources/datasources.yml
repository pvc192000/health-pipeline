apiVersion: 1
datasources:
  - name: CloudWatch
    type: cloudwatch
    access: proxy
    jsonData:
      authType: default
      defaultRegion: us-east-1
  - name: Athena
    type: grafana-athena-datasource
    access: proxy
    jsonData:
      authType: default
      defaultRegion: us-east-1
      catalog: AwsDataCatalog
      database: health_pipeline_db
      workgroup: primary
      outputLocation: s3://health-pipeline-processed-${AWS_ACCOUNT_ID}/athena-results/
